services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web-app
      - user-service
      - product-service
    networks:
      - app-net
  web-app:
    build: ./web-app
    environment:
      - NEXT_PUBLIC_API_URL=http://nginx/api
    networks:
      - app-net
  user-service:
    build: ./user-service
    environment:
      - MONGO_URI=mongodb://mongo-user:27017/users
    depends_on:
      - mongo-user
    networks:
      - app-net
  product-service:
    build: ./product-service
    environment:
      - MONGO_URI=mongodb://mongo-product:27017/products
    depends_on:
      - mongo-product
    networks:
      - app-net
  mongo-user:
    image: mongo
    volumes:
      - mongo-user-data:/data/db
    networks:
      - app-net
  mongo-product:
    image: mongo
    volumes:
      - mongo-product-data:/data/db
    networks:
      - app-net
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - app-net
volumes:
  mongo-user-data:
  mongo-product-data:
  redis-data:
networks:
  app-net:
